version: "3.9"

##################################################
# NextGen MIS - Containerised architecture       #
# - postgres       = Gold (warehouse DB)         #
# - backend        = Flask API + ETL             #
# - frontend       = React SPA                   #
# - bronze/silver/gold = shared volumes          #
##################################################

services:
  postgres:
    image: postgres:16-alpine
    container_name: nextgen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ucu_datawarehouse
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextgen_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Point the backend at the PostgreSQL warehouse container
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      # Flask secrets – override in production
      SECRET_KEY: "change-me-in-prod"
      JWT_SECRET_KEY: "change-me-in-prod-too"
    ports:
      - "5000:5000"
    volumes:
      # Mount the whole backend project (for live code edits in dev)
      - ./backend:/app
      # Medallion layers as separate named volumes (easy to inspect and manage)
      - bronze_data:/app/data/bronze
      - silver_data:/app/data/silver
      - gold_data:/app/data/gold

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextgen_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # React dev server will proxy API calls to this URL (see package.json "proxy")
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  pg_data:
  bronze_data:
  silver_data:
  gold_data:
