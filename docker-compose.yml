version: "3.9"

##################################################
# NextGen MIS - Containerised architecture       #
# - postgres       = Gold (warehouse DB)         #
# - backend        = Flask API (stateless)       #
# - bronze-etl     = Bronze compute container    #
# - silver-etl     = Silver compute container    #
# - gold-etl       = Gold compute container      #
# - frontend       = React SPA                   #
# - bronze/silver/gold = shared volumes          #
##################################################

services:
  postgres:
    image: postgres:16-alpine
    container_name: nextgen_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ucu_datawarehouse
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextgen_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Point the backend API at the PostgreSQL warehouse container
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      # Flask secrets – override in production
      SECRET_KEY: "change-me-in-prod"
      JWT_SECRET_KEY: "change-me-in-prod-too"
    ports:
      - "5000:5000"
    volumes:
      # Mount the backend source for live reload in development
      - ./backend:/app

  bronze-etl:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextgen_bronze_etl
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Bronze ETL uses the same database connection (for any metadata it needs)
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      ETL_PHASE: "bronze"
    volumes:
      # Share code and data directories so parquet files land in the bronze volume
      - ./backend:/app
      - bronze_data:/app/data/bronze

  silver-etl:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextgen_silver_etl
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      ETL_PHASE: "silver"
    volumes:
      - ./backend:/app
      - bronze_data:/app/data/bronze
      - silver_data:/app/data/silver

  gold-etl:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nextgen_gold_etl
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      ETL_PHASE: "gold"
    volumes:
      - ./backend:/app
      - bronze_data:/app/data/bronze
      - silver_data:/app/data/silver
      - gold_data:/app/data/gold

  airflow:
    image: apache/airflow:2.10.2
    container_name: nextgen_airflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_meta
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      # Create a reusable connection pointing at the warehouse DB
      AIRFLOW_CONN_NEXTGEN_POSTGRES: postgresql+psycopg2://postgres:postgres@postgres:5432/ucu_datawarehouse
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com
        --password admin || true &&
      exec airflow webserver
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextgen_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # React dev server will proxy API calls to this URL (see package.json "proxy")
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

volumes:
  pg_data:
  bronze_data:
  silver_data:
  gold_data:
